<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snitap Patins</title>

  <link rel="stylesheet" href="styles/index.css">


  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Montserrat:ital,wght@0,500;1,500&family=Syne:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <a href="#" title="Snitap Patins">
      <img src="assets/logo.svg" alt="Logo da Snitap Patins">
    </a>
    <a href="#" title="Bolsa para compras">
      <img src="assets/icons/shopping-bag.svg" alt="Ícone da bolsa para compras">
      <span>1</span>
    </a>
  </header>

  <section class="hero">
    <div>
      <h1>
        Snitap, sua vida mais
        <div>
          <span>radical</span>
          <span>divertida</span>
          <span>saudável</span>
          <span>radical</span>
        </div>
      </h1>

      <div class="buttons">
        <a href="#" class="button buy shadow">
          <img src="assets/icons/shopping-bag.svg" alt="Ícone de bolsa de compras">
          COMPRAR AGORA
        </a>

        <a href="#" class="button play">
          <span class="shadow">
            <img src="assets/icons/play.svg" alt="Ícone de seta para direita">
          </span>
          VEJA EM AÇÃO            
        </a>
      </div>
      
    </div>

    <div>
      <div class="content">
        <img src="assets/hero/ellipse.svg" alt="Elipse ciano">
        <img src="assets/hero/patins.png" alt="Patins Snitap">
        <img src="assets/hero/stars01.svg" alt="Estrelas pretas">
        <img src="assets/hero/stars02.svg" alt="Estrelas pretas">
      </div>

    </div>

  </section>

</html>
